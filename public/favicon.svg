<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B0F19"/>
      <stop offset="100%" stop-color="#111622"/>
    </linearGradient>
    <linearGradient id="glow" x1="40" y1="20" x2="88" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00DC82"/>
      <stop offset="100%" stop-color="#00b368"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00DC82" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- 圆角矩形背景 -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- 外圈光晕 -->
  <circle cx="64" cy="56" r="32" fill="#00DC82" opacity="0.06"/>
  <!-- 灯泡主体 -->
  <g filter="url(#shadow)">
    <!-- 灯泡上半部分（圆形） -->
    <path d="M64 24C49.088 24 37 36.088 37 51c0 9.6 5.04 18.04 12.6 22.8 2.16 1.36 3.4 3.72 3.4 6.2v2h22v-2c0-2.48 1.24-4.84 3.4-6.2C85.96 69.04 91 60.6 91 51c0-14.912-12.088-27-27-27z" fill="url(#glow)"/>
    <!-- 灯泡底座 -->
    <rect x="53" y="82" width="22" height="4" rx="2" fill="#00DC82" opacity="0.7"/>
    <rect x="55" y="88" width="18" height="4" rx="2" fill="#00DC82" opacity="0.5"/>
    <rect x="57" y="94" width="14" height="4" rx="2" fill="#00DC82" opacity="0.3"/>
    <!-- 灯泡内的代码符号 < /> -->
    <text x="64" y="58" text-anchor="middle" font-family="monospace" font-size="20" font-weight="bold" fill="#0B0F19" opacity="0.8">&lt;/&gt;</text>
  </g>
